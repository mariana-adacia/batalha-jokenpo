<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô - Front + Back</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 0.5rem; }
        p.subtitle { color: #666; margin-top: 0; margin-bottom: 1.5rem; }
        
        .botoes {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 2rem;
        }
        button.btn-jogada {
            background: #ffffff;
            border: 2px solid #e1e4e8;
            border-radius: 8px;
            padding: 15px;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
        }
        button.btn-jogada:hover {
            border-color: #6c5ce7;
            background: #f8f7ff;
            transform: translateY(-2px);
        }
        button.btn-jogada:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .placar {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-weight: bold;
        }
        .resultado-box {
            border-top: 2px dashed #eee;
            padding-top: 1.5rem;
        }
        .emoji-grande { font-size: 2.5rem; margin: 10px 0; }
        .status { font-size: 1.2rem; font-weight: bold; color: #333; }
        .vitoria { color: #00b894; }
        .derrota { color: #d63031; }
        .empate { color: #fdcb6e; }
    </style>
</head>
<body>

<div class="container">
    <h1>✌️ Jokenpô ✊</h1>
    <p class="subtitle">Você (Front) vs Computador (Back-end)</p>

    <div class="placar">
        <span>Sua pontuação: <span id="pontos-user">0</span></span>
        <span>PC: <span id="pontos-pc">0</span></span>
    </div>

    <div class="botoes">
        <button class="btn-jogada" onclick="jogar('pedra')" title="Pedra">🪨</button>
        <button class="btn-jogada" onclick="jogar('papel')" title="Papel">📄</button>
        <button class="btn-jogada" onclick="jogar('tesoura')" title="Tesoura">✂️</button>
    </div>

    <div class="resultado-box">
        <div id="status-texto" class="status">Escolha sua jogada acima!</div>
        <div id="versus-emojis" class="emoji-grande">❔ vs ❔</div>
        <p id="detalhes" style="color: #666; margin: 0;"></p>
    </div>
</div>

<script>
    const emojis = {
        'pedra': '🪨',
        'papel': '📄',
        'tesoura': '✂️'
    };

    let pontosUser = 0;
    let pontosPc = 0;

    async function jogar(minhaJogada) {
        const statusTexto = document.getElementById('status-texto');
        const versusEmojis = document.getElementById('versus-emojis');
        const detalhes = document.getElementById('detalhes');

        statusTexto.textContent = "O Back-end está pensando...";
        statusTexto.className = "status";
        versusEmojis.textContent = `${emojis[minhaJogada]} vs ⏳`;
        detalhes.textContent = "";

        try {
            const resposta = await fetch('http://127.0.0.1:8000/jogar', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ jogada: minhaJogada })
            });

            if (!resposta.ok) {
                throw new Error("Erro na resposta do servidor");
            }

            const dados = await resposta.json();
            const jogadaPC = dados.computador;
            const resultado = dados.resultado; 

            versusEmojis.textContent = `${emojis[minhaJogada]} vs ${emojis[jogadaPC] || '❓'}`;
            detalhes.textContent = `Você jogou ${minhaJogada} e o PC jogou ${jogadaPC}`;

            if (resultado === 'vitoria') {
                statusTexto.textContent = "Você venceu! 🎉";
                statusTexto.className = "status vitoria";
                pontosUser++;
            } else if (resultado === 'derrota') {
                statusTexto.textContent = "O Back-end venceu! 🤖";
                statusTexto.className = "status derrota";
                pontosPc++;
            } else {
                statusTexto.textContent = "Deu empate! 🤝";
                statusTexto.className = "status empate";
            }

            document.getElementById('pontos-user').textContent = pontosUser;
            document.getElementById('pontos-pc').textContent = pontosPc;

        } catch (erro) {
            statusTexto.textContent = "Erro ao conectar com a API 😢";
            statusTexto.className = "status derrota";
            detalhes.textContent = "Verifique se o servidor FastAPI (uvicorn) está rodando no terminal!";
            console.error("Detalhes do erro:", erro);
        }
    }
</script>
</body>
</html>
